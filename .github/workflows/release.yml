name: Release & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    name: Build Tauri App
    needs: release-please
    # Build on EVERY main push, not just releases
    uses: ./.github/workflows/build-desktop.yml
    with:
      # Use release tag if available, otherwise use dev tag
      tag_name: ${{ needs.release-please.outputs.tag_name || format('dev-{0}', github.sha) }}
      version: ${{ needs.release-please.outputs.version || '0.0.0-dev' }}
    secrets: inherit
