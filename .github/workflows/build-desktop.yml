name: Build Desktop

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release'
        required: true
        type: string
      version:
        description: 'Version number'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            rust_target: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ inputs.tag_name }}
          releaseName: 'CrAIte v${{ inputs.version }}'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  upload-s3:
    name: Upload binaries to S3
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install AWS CLI
        run: pip install awscli

      - name: Download release assets from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ inputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --dir release-assets \
            --pattern "*.exe" \
            --pattern "*.msi" \
            --pattern "*.dmg" \
            --pattern "*.AppImage" \
            --pattern "*.deb"

      - name: Generate latest.json
        run: |
          VERSION="${{ inputs.tag_name }}"
          BASE_URL="${{ secrets.S3_PUBLIC_URL }}/${VERSION}"

          # Build platforms JSON by scanning downloaded assets
          PLATFORMS="{}"

          for file in release-assets/*; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            size=$(stat --printf="%s" "$file")

            case "$filename" in
              *_x64-setup.exe|*.msi)
                PLATFORMS=$(echo "$PLATFORMS" | jq \
                  --arg url "$BASE_URL/$filename" \
                  --arg name "$filename" \
                  --argjson size "$size" \
                  '.windows = {url: $url, filename: $name, size: $size}')
                ;;
              *_aarch64.dmg)
                PLATFORMS=$(echo "$PLATFORMS" | jq \
                  --arg url "$BASE_URL/$filename" \
                  --arg name "$filename" \
                  --argjson size "$size" \
                  '.mac_arm = {url: $url, filename: $name, size: $size}')
                ;;
              *_x64.dmg)
                PLATFORMS=$(echo "$PLATFORMS" | jq \
                  --arg url "$BASE_URL/$filename" \
                  --arg name "$filename" \
                  --argjson size "$size" \
                  '.mac_intel = {url: $url, filename: $name, size: $size}')
                ;;
              *.AppImage|*.deb)
                PLATFORMS=$(echo "$PLATFORMS" | jq \
                  --arg url "$BASE_URL/$filename" \
                  --arg name "$filename" \
                  --argjson size "$size" \
                  '.linux = {url: $url, filename: $name, size: $size}')
                ;;
            esac
          done

          echo "{\"version\": \"$VERSION\", \"platforms\": $PLATFORMS}" | jq . > release-assets/latest.json
          cat release-assets/latest.json

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          S3_ENDPOINT="${{ secrets.S3_ENDPOINT }}"
          S3_BUCKET="${{ secrets.S3_BUCKET }}"
          VERSION="${{ inputs.tag_name }}"

          # Upload versioned binaries
          for file in release-assets/*; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            aws s3 cp "$file" "s3://${S3_BUCKET}/${VERSION}/${filename}" \
              --endpoint-url "$S3_ENDPOINT"
          done

          # Upload latest.json to bucket root
          aws s3 cp release-assets/latest.json "s3://${S3_BUCKET}/latest.json" \
            --endpoint-url "$S3_ENDPOINT"
